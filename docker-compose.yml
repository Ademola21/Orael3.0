# ─────────────────────────────────────────────────────────────
#  Orael — Docker Compose
#  One-command deployment: `docker compose up -d`
# ─────────────────────────────────────────────────────────────

services:
  orael:
    build:
      context: .
      args:
        - VITE_ADSGRAM_BLOCK_ID=${VITE_ADSGRAM_BLOCK_ID}
        - VITE_ADSGRAM_TASK_BLOCK_ID=${VITE_ADSGRAM_TASK_BLOCK_ID}
    container_name: orael-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - orael-data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--header=x-forwarded-proto: https", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  orael-data:
    driver: local
